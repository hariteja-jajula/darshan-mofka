# Polaris Spack environment for the Darshan->Mofka demo.
#
# This file is intentionally user-owned/rebuildable: it does not reference the
# author's /eagle install tree. Build it in a per-user Spack environment, then
# point MOFKA_SPACK_VIEW at that environment's view before sourcing server/env.sh.
spack:
  specs:
  - cmake@3.31.11
  - mofka@main+python
  - mochi-bedrock+python

  view: true

  concretizer:
    unify: true

  modules:
    prefix_inspections:
      lib: [LD_LIBRARY_PATH]
      lib64: [LD_LIBRARY_PATH]

  repos:
    diaspora:
      git: https://github.com/diaspora-project/diaspora-spack-packages.git
      destination: $env/repos/diaspora
    mochi:
      git: https://github.com/mochi-hpc/mochi-spack-packages.git
      destination: $env/repos/mochi

  packages:
    mpi:
      require:
      - cray-mpich
    pkgconfig:
      require:
      - pkg-config
    mercury:
      # Polaris login/compute nodes may block cross-memory attach with Yama.
      # The demo uses OFI transports, so do not build Mercury's shared-memory NA.
      require:
      - ~boostsys ~checksum +ofi ~ucx +hwloc ~sm
    cray-mpich:
      buildable: false
      externals:
      - spec: cray-mpich@8.1.32
        prefix: /opt/cray/pe/mpich/8.1.32/ofi/gnu/12.3
        modules:
        - PrgEnv-gnu/8.6.0
        - libfabric/2.2.0rc1
        - cray-mpich/8.1.32
    gcc:
      externals:
      - spec: gcc@14.2.0 languages:='c,c++,fortran'
        prefix: /opt/cray/pe/gcc-native/14
        extra_attributes:
          compilers:
            c: /opt/cray/pe/gcc-native/14/bin/gcc
            cxx: /opt/cray/pe/gcc-native/14/bin/g++
            fortran: /opt/cray/pe/gcc-native/14/bin/gfortran
    libfabric:
      buildable: false
      externals:
      - spec: libfabric@2.2.0
        modules:
        - libfabric/2.2.0rc1
    autoconf:
      buildable: false
      externals:
      - spec: autoconf@2.69
        prefix: /usr
    automake:
      buildable: false
      externals:
      - spec: automake@1.15.1
        prefix: /usr
    gmake:
      buildable: false
      externals:
      - spec: gmake@4.2.1
        prefix: /usr
    libtool:
      buildable: false
      externals:
      - spec: libtool@2.4.6
        prefix: /usr
    openssl:
      buildable: false
      externals:
      - spec: openssl@3.1.4
        prefix: /usr
    m4:
      buildable: false
      externals:
      - spec: m4@1.4.18
        prefix: /usr
    pkg-config:
      buildable: false
      externals:
      - spec: pkg-config@0.29.2
        prefix: /usr
    git:
      buildable: false
      externals:
      - spec: git@2.43.0
        prefix: /usr
    libxml2:
      buildable: false
      externals:
      - spec: libxml2@2.10.3
        prefix: /usr
    ncurses:
      buildable: false
      externals:
      - spec: ncurses@6.1
        prefix: /usr
