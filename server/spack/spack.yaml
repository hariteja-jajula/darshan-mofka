# Polaris-native Spack environment for the Mofka/FlowCept stack this demo needs
# (Bedrock, Mochi (margo/mercury/thallium/warabi/yokan/flock), Mofka, Darshan).
#
# This is the dependency spec for the stack that `server/env_polaris.sh` expects to
# find as a built Spack *view*. The prebuilt binaries are NOT in git (they are ~1GB
# of compiled artifacts); this file + spack.lock are how you rebuild them on Polaris.
#
# HOW TO BUILD (see server/spack/README.md for detail):
#   git clone --depth=1 https://github.com/spack/spack.git
#   . spack/share/spack/setup-env.sh
#   spack env create flowcept-mofka-polaris server/spack/spack.yaml
#   spack env activate flowcept-mofka-polaris
#   spack install -j4                       # -j4: Polaris login nodes fork-cap higher -j
# then point the demo at the result:
#   export MOFKA_SPACK_VIEW=$(spack location --env)/.spack-env/view
#
# Compiler = gcc@12.3.0 (/usr/bin/gcc-12), the ALCF-supported Polaris system gcc.
# MPI = cray-mpich; libfabric/rdma-core are Polaris PE externals. Everything else
# builds from source so the stack is reproducible and not tied to any one account.
spack:
  specs:
  - mofka@main
  - darshan-runtime
  - darshan-util

  view: true
  concretizer:
    unify: true
    reuse: false          # clean Polaris-native solve (do not reuse foreign specs)

  develop:
    # Mofka is built from a source checkout so the connector patch is included.
    # Point this at your mofka checkout (e.g. a sibling clone of
    # https://github.com/mochi-hpc/mofka). Edit before `spack install`.
    mofka:
      spec: mofka@main
      path: ../../../mofka          # relative to this env dir; adjust to your layout

  modules:
    prefix_inspections:
      lib: [LD_LIBRARY_PATH]
      lib64: [LD_LIBRARY_PATH]

  repos:
    diaspora:
      git: https://github.com/diaspora-project/diaspora-spack-packages.git
    mochi:
      git: https://github.com/mochi-hpc/mochi-spack-packages.git
    builtin:
      git: https://github.com/spack/spack-packages.git

  packages:
    # same dep versions as the validated build (a re-solve, not a version bump)
    diaspora-stream-api:
      require: '@0.5.7:'
    mochi-yokan:
      require: +rocksdb
    mercury:
      require: ['~boostsys ~checksum +ofi ~ucx +hwloc']

    # ---- Polaris MPI: cray-mpich (gnu/12.3 build, matches gcc@12.3.0) ----
    mpi:
      require: [mpich]
    mpich:
      buildable: false
      externals:
      - spec: mpich@8.1.28 %gcc@12.3.0
        prefix: /opt/cray/pe/mpich/8.1.28/ofi/gnu/12.3

    # ---- OS / PE externals (real Polaris paths) ----
    libfabric:
      buildable: false
      externals:
      - spec: libfabric@2.2.0 fabrics=rxm,tcp,verbs
        prefix: /opt/cray/libfabric/2.2.0rc1
    rdma-core:
      buildable: false
      externals:
      - spec: rdma-core@52.0
        prefix: /usr
    # cmake/hwloc/pkgconf are built from source on purpose (Polaris lacks the dev
    # headers / has pkg-config not pkgconf), so they are not listed as externals.
    openssl:
      externals:
      - spec: openssl@1.1.1
        prefix: /usr
    autoconf:
      externals:
      - spec: autoconf@2.69
        prefix: /usr
    automake:
      externals:
      - spec: automake@1.16.1
        prefix: /usr
    libtool:
      externals:
      - spec: libtool@2.4.6
        prefix: /usr
    m4:
      externals:
      - spec: m4@1.4.18
        prefix: /usr
    git:
      externals:
      - spec: git@2.39.3~tcltk
        prefix: /usr
    gmake:
      externals:
      - spec: gmake@4.2.1
        prefix: /usr
    tar:
      externals:
      - spec: tar@1.34
        prefix: /usr
    findutils:
      externals:
      - spec: findutils@4.8.0
        prefix: /usr
    diffutils:
      externals:
      - spec: diffutils@3.6
        prefix: /usr
    sed:
      externals:
      - spec: sed@4.4
        prefix: /usr
    gawk:
      externals:
      - spec: gawk@4.2.1
        prefix: /usr
