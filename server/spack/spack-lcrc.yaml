# This is a Spack Environment file for tekapp on Improv (ANL LCRC).
#
# Adapted from platform-configurations/ANL/Improv/spack.yaml: same compiler /
# externals / network configuration, with the spec list switched to tekapp +
# mofka and the diaspora & mochi package repos declared via `repos:`.
spack:
  specs:
  - mofka@main
  - mofka@main+python
  - darshan-runtime
  - darshan-util
  - darshan-runtime+mpi
  view: true
  concretizer:
    unify: true
  modules:
    prefix_inspections:
      lib: [LD_LIBRARY_PATH]
      lib64: [LD_LIBRARY_PATH]
  repos:
    diaspora:
      git: https://github.com/diaspora-project/diaspora-spack-packages.git
      destination: __SPACK_REPOS__/diaspora
      # if you want to use a specific commit, uncomment and change the following line
      # commit: <commit-hash>
    mochi:
      git: https://github.com/mochi-hpc/mochi-spack-packages.git
      destination: __SPACK_REPOS__/mochi
      # if you want to use a specific commit, uncomment and change the following line
      # commit: <commit-hash>
    builtin:
      git: https://github.com/spack/spack-packages.git
      destination: __SPACK_REPOS__/builtin
      # if you want to use a specific commit, uncomment and change the following line
      # commit: <commit-hash>
  packages:
    diaspora-stream-api:
      require: '@0.5.7:'
    mochi-yokan:
      require: +rocksdb
    gcc:
      externals:
      - spec: gcc@13.2.0 languages:='c,c++,fortran'
        prefix: /gpfs/fs1/soft/improv/software/spack-built/linux-rhel8-x86_64/gcc-8.5.0/gcc-13.2.0-iyqxotb
        modules:
        - gcc/13.2.0
        extra_attributes:
          compilers:
            c: /gpfs/fs1/soft/improv/software/spack-built/linux-rhel8-x86_64/gcc-8.5.0/gcc-13.2.0-iyqxotb/bin/gcc
            cxx: /gpfs/fs1/soft/improv/software/spack-built/linux-rhel8-x86_64/gcc-8.5.0/gcc-13.2.0-iyqxotb/bin/g++
            fortran: /gpfs/fs1/soft/improv/software/spack-built/linux-rhel8-x86_64/gcc-8.5.0/gcc-13.2.0-iyqxotb/bin/gfortran
    mpi:
      require:
      - openmpi
    pkgconfig:
      require:
      - pkgconf
    mercury:
      require:
      - ~boostsys ~checksum +ofi ~ucx +hwloc ~sm
    openmpi:
      buildable: false
      externals:
      - spec: openmpi@5.0.2
        prefix: /gpfs/fs1/soft/improv/software/spack-built/linux-rhel8-zen3/gcc-13.2.0/openmpi-5.0.2-7bjpmj4
    libfabric:
      require:
      - fabrics=rxm,verbs
    ucx:
      buildable: false
      externals:
      - spec: ucx@1.14.0
        prefix: /
    rdma-core:
      buildable: false
      externals:
      - spec: rdma-core@52.0
        prefix: /usr
    cmake:
      externals:
      - spec: cmake@3.26.5
        prefix: /usr
    groff:
      externals:
      - spec: groff@1.22.3
        prefix: /usr
    gettext:
      externals:
      - spec: gettext@0.19.8.1
        prefix: /usr
    bison:
      externals:
      - spec: bison@3.0.4
        prefix: /usr
    flex:
      externals:
      - spec: flex@2.6.1+lex
        prefix: /usr
    openssl:
      externals:
      - spec: openssl@1.1.1k
        prefix: /usr
    coreutils:
      externals:
      - spec: coreutils@8.30
        prefix: /usr
    curl:
      externals:
      - spec: curl@7.61.1+gssapi+ldap+nghttp2
        prefix: /usr
    git:
      externals:
      - spec: git@2.39.3~tcltk
        prefix: /usr
    pkgconf:
      externals:
      - spec: pkgconf@1.4.2
        prefix: /usr
    diffutils:
      externals:
      - spec: diffutils@3.6
        prefix: /usr
    libtool:
      externals:
      - spec: libtool@2.4.6
        prefix: /usr
    m4:
      externals:
      - spec: m4@1.4.18
        prefix: /usr
    openssh:
      externals:
      - spec: openssh@8.0p1
        prefix: /usr
    sed:
      externals:
      - spec: sed@4.5
        prefix: /usr
    autoconf:
      externals:
      - spec: autoconf@2.69
        prefix: /usr
    gawk:
      externals:
      - spec: gawk@4.2.1
        prefix: /usr
    tar:
      externals:
      - spec: tar@1.30
        prefix: /usr
    findutils:
      externals:
      - spec: findutils@4.6.0
        prefix: /usr
    zlib:
      externals:
      - spec: zlib@1.2.11
