# install/config.yaml -- versions + names for the automated setup (install/setup.sh).
#
# Only VERSIONS and NAMES live here. NO hardcoded paths, accounts, or usernames:
# paths are derived at run time from the repo location and the active user's
# environment. Edit versions here; install/setup.sh reads them. See
# install/README.md (and the top-level README for the manual setup).

# ---- where things get created (RELATIVE to repo root, which is on eagle) -------
# These are names only; the scripts prefix them with the detected repo root.
layout:
  spack_dir:        "install/_spack"            # cloned spack + the built env/view
  spack_env_name:   "flowcept-mofka-polaris"    # spack env name (matches server/spack)
  mongo_env_dir:    "server/_mongo_env"          # conda prefix for mongod (on eagle)
  venv_dir:         "install/_venv"              # python venv for the flowcept consumer
  darshan_prefix:   "darshan/install"            # darshan runtime install (non-MPI)
  util_prefix:      "darshan/darshan-util/install"

# ---- spack (native HPC stack: bedrock/mochi/mofka/darshan-util deps + cmake) ---
# IMPORTANT: server/spack/spack.lock is lockfile-version 6, written by spack
# 1.2.0.dev0 (commit cd9936355). Older spack (e.g. 0.23) CANNOT read a v6 lock, so
# we pin the exact commit that produced it for byte-identical reproduction.
spack:
  git_url:    "https://github.com/spack/spack.git"
  git_commit: "cd9936355d77a6617c83056fe3a54056bab21909"  # wrote spack.lock (v6)
  git_ref:    "develop"            # fallback branch if the commit is unfetchable
  env_spec:   "server/spack/spack.yaml"  # the committed spec (specs + externals)
  env_lock:   "server/spack/spack.lock"  # the committed pinned concretization (v6)
  build_jobs: 4                    # -j4: Polaris login-node fork cap

# ---- mongodb server (mongod) -- conda, NOT pip -------------------------------
mongo:
  channel: "conda-forge"
  package: "mongodb"
  version: "7.0.34"                # validated on Polaris (v7.0.34)
  # OPTIONAL overrides so the fetch works regardless of where the repo is cloned:
  #   mongod_path: absolute path to an existing mongod to reuse (symlinked in)
  #   conda_bin:   absolute path to a conda to create the env with
  # Leave blank to auto-detect (searches eagle account tree, then PATH).
  mongod_path: ""
  conda_bin: ""

# ---- python consumer deps (installed into venv_dir on top of the spack python) -
# Canonical list lives in server/requirements.txt (pinned). Kept there so pip and
# these scripts agree; this key just points at it.
python:
  requirements: "server/requirements.txt"
  flowcept_editable: "flowcept"    # submodule, pip install -e

# ---- project source (submodules; built from source) --------------------------
project:
  diaspora_dir: "diaspora-stream-api"
  darshan_dir:  "darshan"
  # diaspora-c version requirement (also enforced in server/spack/spack.yaml)
  diaspora_require: "@0.5.7:"

# ---- mofka source checkout (spack builds it via `develop`, not from a release) -
# server/spack/spack.yaml has `develop: mofka path: ../../../mofka`. We clone mofka
# here and point spack's develop at it so the connector patch is included.
mofka:
  git_url: "https://github.com/mochi-hpc/mofka.git"
  git_ref: "main"
  dir:     "install/_mofka"        # clone location (on eagle), relative to repo root
