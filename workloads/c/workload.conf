# C workload knobs (ML training analogy). Only two knobs, no time knob -- the event
# count is computed from these ahead of time so you can size a run:
#
#   POSIX events = epochs + 2                        (train log: open + one write/epoch + close)
#   STDIO events = 3 * (epochs / checkpoint_every)   (each checkpoint: fopen + fwrite + fclose)
#   TOTAL        = (epochs + 2) + 3*(epochs / checkpoint_every)
#
# e.g. epochs=8, checkpoint_every=4 -> 10 POSIX + 6 STDIO = 16 events (quick e2e).
#      epochs=50000, checkpoint_every=1000 -> 50002 + 150 = ~50152 (sustained study).
#
# Override without editing this file: set env EPOCHS / CHECKPOINT_EVERY (when both
# are set the file is not read, so the event count stays exact).

epochs=8
checkpoint_every=4
